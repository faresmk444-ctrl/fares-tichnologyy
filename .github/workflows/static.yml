<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="الموقع الشخصي الرسمي لفارس MK - مطور مواقع ويب ومبرمج شغوف بتطوير الحلول الرقمية الحديثة." />
  <meta name="keywords" content="Fares MK, فارس, Portfolio, Web Developer, HTML, CSS, JavaScript, UI UX" />
  <meta name="author" content="Fares MK" />
  <title>Fares MK | Portfolio Website</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --black: #0A0A0A;
      --black-2: #111111;
      --black-3: #171717;
      --gold: #D4AF37;
      --gold-2: #F5D56A;
      --gold-dark: #8F741D;
      --white: #FFFFFF;
      --muted: #B8B8B8;
      --soft: rgba(255, 255, 255, 0.08);
      --soft-2: rgba(255, 255, 255, 0.12);
      --glass: rgba(255, 255, 255, 0.07);
      --border: rgba(212, 175, 55, 0.23);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      --radius: 24px;
      --transition: 0.35s ease;
      --container: 1180px;
      --font-display: "Amiri", "Cairo", serif;
      --font-body: "Cairo", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--gold) var(--black);
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    body {
      font-family: var(--font-body);
      background:
        radial-gradient(circle at 85% 5%, rgba(212, 175, 55, 0.17), transparent 28%),
        radial-gradient(circle at 8% 18%, rgba(212, 175, 55, 0.10), transparent 30%),
        linear-gradient(135deg, #050505 0%, #0A0A0A 45%, #111111 100%);
      color: var(--white);
      line-height: 1.8;
      overflow-x: hidden;
    }

    body.no-scroll {
      overflow: hidden;
    }

    ::selection {
      background: var(--gold);
      color: #000;
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--black);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(var(--gold), var(--gold-dark));
      border-radius: 20px;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    ul {
      list-style: none;
    }

    :focus-visible {
      outline: 2px solid var(--gold-2);
      outline-offset: 3px;
      border-radius: 6px;
    }

    .container {
      width: min(92%, var(--container));
      margin-inline: auto;
    }

    .gold-text {
      background: linear-gradient(135deg, var(--gold-2), var(--gold), #9a7b20);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .section {
      padding: 110px 0;
      position: relative;
    }

    .section-header {
      text-align: center;
      max-width: 720px;
      margin: 0 auto 58px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold-2);
      background: rgba(212, 175, 55, 0.09);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 18px;
      backdrop-filter: blur(12px);
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 16px var(--gold);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.35;
      margin-bottom: 16px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .section-desc {
      color: var(--muted);
      font-size: 1.05rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 26px;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid transparent;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold-2), var(--gold), var(--gold-dark));
      color: #080808;
      box-shadow: 0 16px 35px rgba(212, 175, 55, 0.22);
    }

    .btn-primary:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 45px rgba(212, 175, 55, 0.34);
    }

    .btn-outline {
      color: var(--white);
      border-color: var(--border);
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
    }

    .btn-outline:hover {
      border-color: var(--gold);
      color: var(--gold-2);
      transform: translateY(-4px);
      background: rgba(212, 175, 55, 0.08);
    }

    .glass-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.035));
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.45), transparent 35%, rgba(255, 255, 255, 0.12));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(212, 175, 55, 0.14), transparent 36%),
        #050505;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-content {
      text-align: center;
    }

    .loader-logo {
      width: 92px;
      height: 92px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.25), rgba(255, 255, 255, 0.06));
      border: 1px solid var(--border);
      color: var(--gold-2);
      font-size: 2rem;
      font-weight: 900;
      animation: pulseLogo 1.7s infinite ease-in-out;
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.22);
    }

    .loader-bar {
      width: 210px;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin: 16px auto 0;
    }

    .loader-bar span {
      display: block;
      height: 100%;
      width: 45%;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-2));
      border-radius: inherit;
      animation: loadingMove 1.25s infinite ease-in-out;
    }

    @keyframes pulseLogo {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); box-shadow: 0 0 70px rgba(212,175,55,0.35); }
    }

    @keyframes loadingMove {
      0% { transform: translateX(150%); }
      100% { transform: translateX(-260%); }
    }

    .cursor-glow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,175,55,0.10), transparent 62%);
      pointer-events: none;
      z-index: -1;
      transform: translate(-50%, -50%);
      opacity: 0.8;
    }

    .navbar {
      position: fixed;
      top: 18px;
      left: 0;
      right: 0;
      z-index: 1000;
      transition: var(--transition);
    }

    .navbar.scrolled {
      top: 10px;
    }

    .nav-wrap {
      width: min(94%, 1220px);
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 18px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      background: rgba(10, 10, 10, 0.68);
      backdrop-filter: blur(24px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.32);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      letter-spacing: 0.2px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: #080808;
      background: linear-gradient(135deg, var(--gold-2), var(--gold), var(--gold-dark));
      box-shadow: 0 10px 25px rgba(212,175,55,0.22);
      font-weight: 900;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-links a {
      color: rgba(255,255,255,0.82);
      padding: 9px 13px;
      border-radius: 999px;
      font-size: 0.94rem;
      font-weight: 700;
      transition: var(--transition);
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--gold-2);
      background: rgba(212,175,55,0.08);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-toggle {
      display: none;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: var(--white);
      border-radius: 14px;
      cursor: pointer;
      font-size: 1.15rem;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 148px 0 80px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(212,175,55,0.13), transparent 62%);
      top: -230px;
      right: -220px;
      pointer-events: none;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(to bottom, black, transparent 88%);
      pointer-events: none;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.02fr 0.98fr;
      gap: 60px;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 17px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--gold-2);
      font-weight: 800;
      margin-bottom: 22px;
      backdrop-filter: blur(14px);
      animation: fadeUp 0.85s ease both;
    }

    .hero-badge i {
      animation: rotateSpark 3s infinite linear;
    }

    @keyframes rotateSpark {
      to { transform: rotate(360deg); }
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.65rem, 6.3vw, 5.6rem);
      line-height: 1.22;
      font-weight: 700;
      letter-spacing: 0;
      margin-bottom: 18px;
      animation: fadeUp 0.85s 0.1s ease both;
    }

    .hero h2 {
      font-size: clamp(1.18rem, 2.4vw, 1.75rem);
      color: var(--gold-2);
      margin-bottom: 18px;
      font-weight: 800;
      animation: fadeUp 0.85s 0.2s ease both;
    }

    .hero p {
      color: var(--muted);
      font-size: 1.08rem;
      max-width: 700px;
      margin-bottom: 34px;
      animation: fadeUp 0.85s 0.3s ease both;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      animation: fadeUp 0.85s 0.4s ease both;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
      animation: fadeUp 0.85s 0.5s ease both;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.86);
    }

    .meta-item i {
      color: var(--gold);
    }

    .hero-visual {
      position: relative;
      min-height: 560px;
      animation: zoomIn 1s 0.25s ease both;
    }

    .image-frame {
      position: absolute;
      inset: 42px 34px 48px 20px;
      border-radius: 36px;
      overflow: hidden;
      border: 1px solid rgba(212,175,55,0.28);
      box-shadow: 0 40px 90px rgba(0,0,0,0.55);
      transform: rotate(-2deg);
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.88) contrast(1.08) brightness(0.82);
      transition: transform 0.8s ease;
    }

    .image-frame:hover img {
      transform: scale(1.07);
    }

    .image-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.64)), linear-gradient(135deg, rgba(212,175,55,0.20), transparent 50%);
    }

    .floating-card {
      position: absolute;
      z-index: 3;
      padding: 17px 18px;
      border-radius: 22px;
      background: rgba(14,14,14,0.72);
      border: 1px solid rgba(212,175,55,0.24);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.35);
      animation: float 5s ease-in-out infinite;
    }

    .floating-card.one {
      top: 70px;
      right: 0;
    }

    .floating-card.two {
      bottom: 74px;
      left: 0;
      animation-delay: 1s;
    }

    .floating-card.three {
      top: 46%;
      left: 18px;
      animation-delay: 1.8s;
    }

    .floating-card strong {
      display: block;
      color: var(--gold-2);
      font-size: 1.05rem;
      margin-bottom: 2px;
    }

    .floating-card span {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .orb {
      position: absolute;
      width: 155px;
      height: 155px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, var(--gold-2), var(--gold-dark), transparent 70%);
      opacity: 0.23;
      filter: blur(3px);
      bottom: 18px;
      right: 20px;
      animation: float 6.4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.94); }
      to { opacity: 1; transform: scale(1); }
    }

    .about-grid {
      display: grid;
      grid-template-columns: 0.92fr 1.08fr;
      gap: 34px;
      align-items: stretch;
    }

    .about-image {
      min-height: 540px;
      padding: 18px;
    }

    .about-image img {
      width: 100%;
      height: 100%;
      min-height: 500px;
      object-fit: cover;
      border-radius: 20px;
      filter: brightness(0.76) saturate(0.92);
    }

    .about-content {
      display: grid;
      gap: 16px;
    }

    .about-box {
      padding: 24px;
      transition: var(--transition);
    }

    .about-box:hover {
      transform: translateY(-6px);
      border-color: rgba(212,175,55,0.34);
    }

    .about-box h3 {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--gold-2);
      margin-bottom: 9px;
      font-size: 1.22rem;
    }

    .about-box h3 i {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(212,175,55,0.12);
      color: var(--gold);
    }

    .about-box p {
      color: var(--muted);
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .skill-card {
      padding: 28px 22px;
      text-align: center;
      transition: var(--transition);
      min-height: 172px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .skill-card:hover {
      transform: translateY(-10px) scale(1.015);
      background: linear-gradient(145deg, rgba(212,175,55,0.13), rgba(255,255,255,0.045));
    }

    .skill-icon {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      color: var(--gold-2);
      font-size: 1.75rem;
      background: rgba(212,175,55,0.10);
      border: 1px solid rgba(212,175,55,0.18);
      transition: var(--transition);
    }

    .skill-card:hover .skill-icon {
      transform: rotateY(180deg);
      color: #080808;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
    }

    .skill-card h3 {
      font-size: 1.1rem;
    }

    .skill-card p {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 26px;
    }

    .project-card {
      transition: var(--transition);
    }

    .project-card:hover {
      transform: translateY(-10px);
    }

    .project-img {
      height: 280px;
      overflow: hidden;
      border-radius: 22px 22px 0 0;
      position: relative;
    }

    .project-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.75s ease;
      filter: brightness(0.76) saturate(0.9);
    }

    .project-card:hover .project-img img {
      transform: scale(1.08);
    }

    .project-img::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 20%, rgba(0,0,0,0.76));
    }

    .project-tag {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 2;
      background: rgba(10,10,10,0.68);
      border: 1px solid var(--border);
      color: var(--gold-2);
      padding: 7px 14px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 800;
      backdrop-filter: blur(14px);
    }

    .project-body {
      padding: 28px;
    }

    .project-body h3 {
      font-family: var(--font-display);
      font-size: 1.7rem;
      margin-bottom: 10px;
      color: var(--white);
    }

    .project-body p {
      color: var(--muted);
      margin-bottom: 22px;
    }

    .project-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .project-tools span {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.78);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .stats {
      background:
        linear-gradient(rgba(10,10,10,0.78), rgba(10,10,10,0.9)),
        url("https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1600&q=80") center/cover fixed;
      border-block: 1px solid rgba(212,175,55,0.14);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .stat-card {
      text-align: center;
      padding: 36px 24px;
      transition: var(--transition);
    }

    .stat-card:hover {
      transform: translateY(-8px);
    }

    .stat-card i {
      color: var(--gold);
      font-size: 2.3rem;
      margin-bottom: 16px;
    }

    .stat-number {
      display: block;
      color: var(--gold-2);
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .stat-card p {
      color: var(--muted);
      font-weight: 700;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .service-card {
      padding: 30px 24px;
      transition: var(--transition);
      min-height: 250px;
    }

    .service-card:hover {
      transform: translateY(-10px);
      background: linear-gradient(145deg, rgba(212,175,55,0.12), rgba(255,255,255,0.04));
    }

    .service-card i {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 20px;
      color: var(--gold-2);
      background: rgba(212,175,55,0.10);
      border: 1px solid rgba(212,175,55,0.18);
      font-size: 1.55rem;
      margin-bottom: 20px;
    }

    .service-card h3 {
      font-size: 1.22rem;
      margin-bottom: 10px;
    }

    .service-card p {
      color: var(--muted);
      font-size: 0.96rem;
    }

    .process-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .process-card {
      padding: 30px 26px;
      transition: var(--transition);
      position: relative;
    }

    .process-card:hover {
      transform: translateY(-8px);
    }

    .process-step {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.22);
      color: var(--gold-2);
      font-weight: 900;
      font-size: 0.92rem;
      margin-bottom: 18px;
    }

    .process-card h3 {
      font-size: 1.15rem;
      margin-bottom: 10px;
    }

    .process-card p {
      color: var(--muted);
      font-size: 0.96rem;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 28px;
      align-items: stretch;
    }

    .contact-info {
      padding: 34px;
    }

    .contact-info h3 {
      font-family: var(--font-display);
      font-size: 2rem;
      margin-bottom: 14px;
    }

    .contact-info p {
      color: var(--muted);
      margin-bottom: 26px;
    }

    .contact-list {
      display: grid;
      gap: 14px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      transition: var(--transition);
    }

    .contact-item:hover {
      transform: translateX(-8px);
      border-color: rgba(212,175,55,0.32);
      background: rgba(212,175,55,0.08);
    }

    .contact-item i {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: rgba(212,175,55,0.12);
      color: var(--gold-2);
      font-size: 1.2rem;
      flex: 0 0 auto;
    }

    .contact-item strong {
      display: block;
      margin-bottom: 2px;
    }

    .contact-item span {
      color: var(--muted);
      font-size: 0.9rem;
      word-break: break-word;
    }

    .contact-form {
      padding: 34px;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    .input-group {
      display: grid;
      gap: 8px;
    }

    .input-group label {
      color: rgba(255,255,255,0.88);
      font-weight: 800;
      font-size: 0.94rem;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.055);
      color: var(--white);
      border-radius: 18px;
      padding: 15px 16px;
      outline: none;
      font-family: inherit;
      transition: var(--transition);
      resize: vertical;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: rgba(212,175,55,0.52);
      box-shadow: 0 0 0 4px rgba(212,175,55,0.09);
    }

    .input-group textarea {
      min-height: 150px;
    }

    .form-note {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: -4px;
    }

    .footer {
      padding: 60px 0 28px;
      background: #050505;
      border-top: 1px solid rgba(212,175,55,0.14);
      position: relative;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr;
      gap: 32px;
      margin-bottom: 36px;
    }

    .footer p,
    .footer a {
      color: var(--muted);
    }

    .footer a {
      transition: var(--transition);
    }

    .footer a:hover {
      color: var(--gold-2);
    }

    .footer h3 {
      margin-bottom: 16px;
      color: var(--white);
    }

    .footer-links {
      display: grid;
      gap: 8px;
    }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .socials a {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      color: var(--white);
      transition: var(--transition);
    }

    .socials a:hover {
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      color: #080808;
      transform: translateY(-5px);
    }

    .copyright {
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      color: var(--muted);
    }

    .back-to-top {
      position: fixed;
      left: 24px;
      bottom: 24px;
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--gold-2), var(--gold));
      color: #080808;
      border: none;
      cursor: pointer;
      z-index: 999;
      font-size: 1.1rem;
      box-shadow: 0 14px 35px rgba(212,175,55,0.26);
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
      transition: var(--transition);
    }

    .back-to-top.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .back-to-top:hover {
      transform: translateY(-6px);
    }

    .reveal {
      opacity: 0;
      transform: translateY(38px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0);
    }

    .zoom-reveal {
      opacity: 0;
      transform: scale(0.92);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .zoom-reveal.show {
      opacity: 1;
      transform: scale(1);
    }

    @media (max-width: 1060px) {
      .hero-grid,
      .about-grid,
      .contact-grid {
        grid-template-columns: 1fr;
      }

      .hero-visual {
        min-height: 520px;
      }

      .skills-grid,
      .services-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .process-grid {
        grid-template-columns: 1fr 1fr;
      }

      .footer-grid {
        grid-template-columns: 1fr 1fr;
      }

      .nav-actions .btn {
        display: none;
      }
    }

    @media (max-width: 860px) {
      .menu-toggle {
        display: grid;
        place-items: center;
      }

      .nav-links {
        position: fixed;
        top: 86px;
        right: 3%;
        left: 3%;
        display: grid;
        gap: 8px;
        padding: 18px;
        border-radius: 26px;
        background: rgba(10,10,10,0.92);
        border: 1px solid rgba(255,255,255,0.10);
        backdrop-filter: blur(22px);
        box-shadow: 0 30px 70px rgba(0,0,0,0.45);
        opacity: 0;
        visibility: hidden;
        transform: translateY(-18px);
        transition: var(--transition);
      }

      .nav-links.open {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }

      .nav-links a {
        padding: 12px 16px;
      }

      .portfolio-grid,
      .stats-grid {
        grid-template-columns: 1fr;
      }

      .section {
        padding: 82px 0;
      }

      .hero {
        padding-top: 132px;
      }

      .hero h1 {
        letter-spacing: -1px;
      }
    }

    @media (max-width: 620px) {
      .nav-wrap {
        border-radius: 24px;
      }

      .brand span:last-child {
        display: none;
      }

      .hero-actions,
      .hero-meta {
        display: grid;
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }

      .hero-visual {
        min-height: 430px;
      }

      .image-frame {
        inset: 44px 8px 50px 8px;
        border-radius: 28px;
      }

      .floating-card {
        padding: 13px 14px;
      }

      .floating-card.three {
        display: none;
      }

      .floating-card.one {
        top: 20px;
        right: 0;
      }

      .floating-card.two {
        bottom: 24px;
        left: 0;
      }

      .skills-grid,
      .services-grid,
      .process-grid,
      .footer-grid {
        grid-template-columns: 1fr;
      }

      .project-img {
        height: 230px;
      }

      .contact-info,
      .contact-form {
        padding: 24px;
      }

      .about-image {
        min-height: 360px;
      }

      .about-image img {
        min-height: 330px;
      }

      .back-to-top {
        left: 16px;
        bottom: 16px;
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>

