  <button class="back-to-top" id="backToTop" aria-label="العودة للأعلى">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script>
    const loadingScreen = document.getElementById("loadingScreen");
    const navbar = document.getElementById("navbar");
    const navLinks = document.getElementById("navLinks");
    const menuToggle = document.getElementById("menuToggle");
    const backToTop = document.getElementById("backToTop");
    const cursorGlow = document.getElementById("cursorGlow");
    const contactForm = document.getElementById("contactForm");

    window.addEventListener("load", () => {
      setTimeout(() => {
        loadingScreen.classList.add("hidden");
        document.body.classList.remove("no-scroll");
      }, 850);
    });

    menuToggle.addEventListener("click", () => {
      const isOpen = navLinks.classList.toggle("open");
      menuToggle.setAttribute("aria-expanded", String(isOpen));
      const icon = menuToggle.querySelector("i");
      icon.classList.toggle("fa-bars");
      icon.classList.toggle("fa-xmark");
    });

    document.querySelectorAll(".nav-links a, .footer a[href^='#']").forEach(link => {
      link.addEventListener("click", () => {
        navLinks.classList.remove("open");
        menuToggle.setAttribute("aria-expanded", "false");
        const icon = menuToggle.querySelector("i");
        icon.classList.add("fa-bars");
        icon.classList.remove("fa-xmark");
      });
    });

    window.addEventListener("scroll", () => {
      const scrolled = window.scrollY > 40;
      navbar.classList.toggle("scrolled", scrolled);
      backToTop.classList.toggle("show", window.scrollY > 520);
      setActiveNav();
    });

    backToTop.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    if (window.matchMedia("(pointer: fine)").matches) {
      window.addEventListener("mousemove", (e) => {
        cursorGlow.style.top = e.clientY + "px";
        cursorGlow.style.left = e.clientX + "px";
      });
    }

    const revealElements = document.querySelectorAll(".reveal, .zoom-reveal");
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach((entry, index) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add("show"), index * 70);
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.14 });

    revealElements.forEach(el => revealObserver.observe(el));

    const counters = document.querySelectorAll(".counter");
    let countersStarted = false;

    function animateCounters() {
      if (countersStarted) return;
      countersStarted = true;

      counters.forEach(counter => {
        const target = Number(counter.dataset.target);
        const duration = 1800;
        const startTime = performance.now();

        function update(currentTime) {
          const elapsed = currentTime - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const ease = 1 - Math.pow(1 - progress, 3);
          const value = Math.floor(ease * target);
          counter.textContent = value.toLocaleString("ar-EG") + "+";

          if (progress < 1) {
            requestAnimationFrame(update);
          } else {
            counter.textContent = target.toLocaleString("ar-EG") + "+";
          }
        }

        requestAnimationFrame(update);
      });
    }

    const statsSection = document.getElementById("achievements");
    const statsObserver = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        animateCounters();
        statsObserver.unobserve(statsSection);
      }
    }, { threshold: 0.35 });

    statsObserver.observe(statsSection);

    function setActiveNav() {
      const sections = document.querySelectorAll("main section[id]");
      const links = document.querySelectorAll(".nav-links a");

      let current = "home";
      sections.forEach(section => {
        const sectionTop = section.offsetTop - 150;
        if (window.scrollY >= sectionTop) {
          current = section.getAttribute("id");
        }
      });

      links.forEach(link => {
        link.classList.remove("active");
        if (link.getAttribute("href") === "#" + current) {
          link.classList.add("active");
        }
      });
    }

    contactForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const name = encodeURIComponent(document.getElementById("name").value.trim());
      const email = encodeURIComponent(document.getElementById("email").value.trim());
      const subject = encodeURIComponent(document.getElementById("subject").value.trim());
      const message = encodeURIComponent(document.getElementById("message").value.trim());

      const body = encodeURIComponent("الاسم: ") + name +
        encodeURIComponent("\nالبريد: ") + email +
        encodeURIComponent("\n\nالرسالة:\n") + message;

      window.location.href = `mailto:your-email@example.com?subject=${subject}&body=${body}`;
    });
  </script>
